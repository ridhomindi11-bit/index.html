<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #111; color: #0f0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #btn { width: 80%; padding: 30px; border: 3px solid #0f0; background: #222; color: #0f0; font-weight: bold; border-radius: 15px; cursor: pointer; text-align: center; font-size: 18px; }
        canvas { width: 90%; height: 120px; margin-top: 20px; background: #000; border: 1px solid #333; }
    </style>
</head>
<body>
    <div id="btn">TAP DISINI UNTUK AKTIFKAN MIC</div>
    <canvas id="viz"></canvas>

    <script>
        const btn = document.getElementById('btn');
        const canvas = document.getElementById('viz');
        const ctx = canvas.getContext('2d');

        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
                });
                
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const source = audioCtx.createMediaStreamSource(stream);
                
                // Compressor
                const compressor = audioCtx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-25, audioCtx.currentTime);
                compressor.ratio.setValueAtTime(12, audioCtx.currentTime);
                
                // Analyser (Visualizer)
                const analyser = audioCtx.createAnalyser();
                analyser.fftSize = 64; // Kecil saja biar ringan
                
                // HUBUNGKAN
                source.connect(compressor);
                compressor.connect(analyser);
                // JANGAN hubungkan ke destination (audioCtx.destination) agar tidak gema/blok
                
                btn.innerText = "MIC AKTIF & COMPRESSED";
                btn.style.borderColor = "#fff";
                btn.style.color = "#fff";

                const dataArray = new Uint8Array(analyser.frequencyBinCount);
                function draw() {
                    requestAnimationFrame(draw);
                    analyser.getByteFrequencyData(dataArray);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    let x = 0;
                    for (let i = 0; i < dataArray.length; i++) {
                        let h = dataArray[i] / 2;
                        ctx.fillStyle = '#0f0';
                        ctx.fillRect(x, canvas.height - h, 5, h);
                        x += 8;
                    }
                }
                draw();
                audioCtx.resume();
            } catch (err) {
                btn.innerText = "ERROR: " + err.name;
                console.error(err);
            }
        }

        btn.addEventListener('click', start, { once: true });
    </script>
</body>
</html>
